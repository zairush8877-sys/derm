# Aura — продакшн-запуск на любом VPS одной командой:
#   cp .env.example .env   (заполнить DERM_SECRET, ANTHROPIC_API_KEY, DOMAIN)
#   docker compose up -d --build
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DERM_DB_PATH: /data/aura.db
      # AI-запросы идут через Cloudflare AI Gateway (шлюз «aura»):
      # Anthropic не принимает запросы напрямую с российских IP.
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://gateway.ai.cloudflare.com/v1/48cbb2b7945df7726c1770a990e494a2/aura/anthropic}
    volumes:
      - aura-data:/data
    expose:
      - "8000"

  caddy:
    # Собственная сборка: Caddy + DNS-плагин Timeweb (см. Dockerfile.caddy).
    # Сертификат выпускается через API Timeweb (DNS-01), нужен TIMEWEB_TOKEN в .env.
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      TIMEWEB_TOKEN: ${TIMEWEB_TOKEN:-}
      # ВАЖНО: с /api/v1 — плагин dmtr636 не добавляет версию сам
      # (без неё API отвечает 404 page not found на dns-records).
      TIMEWEB_API_URL: ${TIMEWEB_API_URL:-https://api.timeweb.cloud/api/v1}
      # Бамп, чтобы docker compose пересоздал Caddy и перечитал Caddyfile
      # (выпуск сертификата для aura-wellness.ru). Меняем число при правках Caddyfile.
      CADDY_CONFIG_REV: "5"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  aura-data:
  caddy-data:
  caddy-config:
