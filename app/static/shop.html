<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>derm — Магазин</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#2563eb" />
</head>
<body>
  <header class="top">
    <div class="wrap">
      <h1>Aura — магазин</h1>
      <p>Косметика, БАДы, спортпит, biohacking, healthy food и диагностика. Цены в рублях.</p>
      <nav class="tabs">
        <a href="/">Главная</a>
        <a href="/shop" class="active">Магазин</a>
        <a href="/skin">Кожа</a>
        <a href="/food">Еда</a>
        <a href="/assistant">Ассистент</a>
        <a href="/tracker">Трекер</a>
        <a href="/subscription">Подписка</a>
        <a href="/docs">B2B API</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="card">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
        <input type="search" id="q" placeholder="Поиск: протеин, витамин D, матча…"
               style="flex:1;min-width:200px;padding:11px 14px;border:1px solid var(--line);border-radius:10px" />
        <span class="badge" id="loyalty">Лояльность…</span>
      </div>
      <div id="cats"></div>
    </div>

    <div class="pgrid" id="grid"></div>

    <div class="card" id="cartCard">
      <h2>Корзина 🛒</h2>
      <div id="cart"></div>
    </div>

    <div class="card">
      <h2>История заказов</h2>
      <div id="orders"></div>
    </div>
  </main>

  <!-- Модалка оформления -->
  <div id="checkoutModal" class="card hidden" style="position:fixed;inset:auto 20px 20px;max-width:420px;z-index:10">
    <h2>Оформление заказа</h2>
    <div class="quiz">
      <div class="full"><label>Имя</label><input id="co-name" /></div>
      <div class="full"><label>Телефон</label><input id="co-phone" /></div>
      <div class="full"><label>Адрес доставки</label><input id="co-address" placeholder="Город, улица, дом" /></div>
      <div class="full"><label>Способ доставки</label><select id="co-method"></select></div>
    </div>
    <button class="primary" id="co-submit">Оплатить и оформить</button>
    <button class="ghost" id="co-cancel">Отмена</button>
  </div>

  <script src="/static/auth-helper.js"></script>
  <script src="/static/shop.js"></script>
</body>
</html>
