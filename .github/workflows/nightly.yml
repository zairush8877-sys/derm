name: Nightly

# Ночная проверка: полный прогон тестов + аудит уязвимостей зависимостей.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Тесты
        env:
          DERM_MOCK_MODE: "1"
        run: python -m pytest -q

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Аудит уязвимостей (pip-audit)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt
